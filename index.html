<!doctype html>
<html lang="en" data-theme="sunflowers">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F7EDD8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icons/icon-180.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900;9..144,400;9..144,500;9..144,600&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <title>Bloom</title>
  <style>
    :root {
      color-scheme: light;
      font-family: 'Lora', serif;
      -webkit-text-size-adjust: 100%;
      background: var(--bg);
      color: var(--ink);
    }

    :root[data-theme="sunflowers"] {
      --bg: #F7EDD8;
      --surface: #FDF6E8;
      --surface-deep: #F0E4C4;
      --ink: #2C1A0E;
      --ink-mid: #6B4A2E;
      --ink-soft: #A07850;
      --yellow: #F0BC18;
      --yellow-deep: #C8920A;
      --yellow-glow: rgba(240,188,24,0.18);
      --yellow-highlight: rgba(255,240,180,0.45);
      --ochre: #B86A10;
      --cobalt: #1848A0;
      --sage: #5A7844;
      --border: rgba(180,140,90,0.25);
      --border-strong: rgba(180,140,90,0.45);
      --centre-outer: #1E0A00;
      --centre-inner: #4A2008;
      --shadow: rgba(44,26,14,0.12);
      --shadow-deep: rgba(44,26,14,0.22);
    }

    :root[data-theme="starry"] {
      --bg: #08122E;
      --surface: #0F1E48;
      --surface-deep: #071030;
      --ink: #EAE2D4;
      --ink-mid: #B8C8E0;
      --ink-soft: #7890B8;
      --yellow: #F0C040;
      --yellow-deep: #C89820;
      --yellow-glow: rgba(240,192,64,0.22);
      --yellow-highlight: rgba(255,230,140,0.35);
      --ochre: #D09050;
      --cobalt: #6890E0;
      --sage: #406840;
      --border: rgba(104,144,224,0.18);
      --border-strong: rgba(104,144,224,0.35);
      --centre-outer: #080400;
      --centre-inner: #201008;
      --shadow: rgba(0,0,0,0.4);
      --shadow-deep: rgba(0,0,0,0.7);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
    }

    body {
      color: var(--ink);
      line-height: 1.5;
    }

    #app {
      min-height: 100vh;
      padding: 1rem 1rem 2rem;
      position: relative;
      overflow-x: hidden;
      background: radial-gradient(circle at top, var(--yellow-glow), transparent 32%), linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.18) 12%, transparent 24%);
      filter: url('#grain');
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1rem;
    }

    .brand {
      display: grid;
      gap: 0.25rem;
    }

    .brand .title {
      font-family: 'Fraunces', serif;
      font-size: clamp(2rem, 5vw, 2.7rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    .brand .subtitle {
      font-size: 0.95rem;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .topbar button {
      border: none;
      background: rgba(255,255,255,0.65);
      color: var(--ink);
      width: 48px;
      height: 48px;
      border-radius: 16px;
      font-size: 1.3rem;
      display: grid;
      place-items: center;
      box-shadow: 0 2px 0 var(--border-strong), 0 6px 24px var(--shadow);
      cursor: pointer;
    }

    .day-screen {
      display: grid;
      gap: 1rem;
    }

    .hero-card {
      padding: 1.5rem;
      border-radius: 32px;
      background: var(--surface);
      box-shadow: 0 2px 0 var(--border-strong), 0 6px 24px var(--shadow);
      border: 1px solid var(--border);
    }

    .date-line {
      font-family: 'Fraunces', serif;
      font-size: 1.2rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      color: var(--ink-mid);
    }

    .hero-copy p {
      margin: 0;
      font-size: 1rem;
      max-width: 30rem;
      color: var(--ink-soft);
    }

    .sunflower-hero {
      margin-top: 1.5rem;
      display: grid;
      place-items: center;
    }

    .sunflower-hero svg {
      width: min(100%, 320px);
      height: auto;
      overflow: visible;
    }

    .placeholder-note {
      padding: 1rem 1.25rem;
      border-radius: 28px;
      background: rgba(255,255,255,0.65);
      border: 1px solid var(--border);
      color: var(--ink-soft);
      font-size: 0.98rem;
    }

    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 240ms ease;
    }

    .sheet-backdrop.active {
      opacity: 1;
      pointer-events: auto;
    }

    .sheet {
      position: fixed;
      inset: auto 0 0;
      z-index: 10;
      transform: translateY(100%);
      transition: transform 260ms ease;
      display: grid;
      place-items: center;
      padding: 0 0.75rem 1rem;
      pointer-events: none;
    }

    .sheet.active {
      transform: translateY(0);
      pointer-events: auto;
    }

    .sheet-panel {
      width: min(100%, 42rem);
      border-radius: 32px 32px 16px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: 0 2px 0 var(--border-strong), 0 20px 40px var(--shadow);
      padding: 1.25rem;
    }

    .sheet-header {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: center;
    }

    .sheet-header h2 {
      font-family: 'Fraunces', serif;
      font-size: 1.45rem;
      margin: 0;
    }

    .sheet-header button {
      border: none;
      background: transparent;
      color: var(--ink);
      font-size: 1.4rem;
      cursor: pointer;
      padding: 0.5rem;
    }

    .setting-block {
      margin-top: 1.25rem;
    }

    .setting-block label {
      display: block;
      margin-top: 0.85rem;
      font-size: 0.98rem;
      color: var(--ink);
      cursor: pointer;
    }

    .setting-block input[type='radio'] {
      margin-right: 0.8rem;
      accent-color: var(--yellow);
    }

    .setting-block .help {
      margin-top: 0.75rem;
      color: var(--ink-soft);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .sheet p,
    .sheet label {
      font-family: 'Lora', serif;
    }

    @media (prefers-color-scheme: dark) {
      :root[data-theme='sunflowers'] {
        color-scheme: dark;
      }
    }

    @media (min-width: 640px) {
      #app {
        padding: 2rem 2rem 3rem;
      }
    }
  </style>
</head>
<body>
  <svg width="0" height="0" aria-hidden="true">
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.92" numOctaves="3" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feBlend in="SourceGraphic" mode="overlay" />
    </filter>
  </svg>

  <div id="app">
    <header class="topbar">
      <div class="brand">
        <div class="title">Bloom</div>
        <div class="subtitle">wellness tracker</div>
      </div>
      <button id="settingsButton" aria-label="Open settings">⚙︎</button>
    </header>

    <main class="day-screen">
      <section class="hero-card">
        <div class="hero-copy">
          <div class="date-line" id="todayDate">Loading...</div>
          <p>A quiet page for today’s habits and sunshine.</p>
        </div>

        <div class="sunflower-hero" aria-hidden="true">
          <svg viewBox="0 0 320 360" role="img" aria-label="Sunflower placeholder">
            <defs>
              <radialGradient id="petalGlow" cx="50%" cy="20%" r="70%">
                <stop offset="0%" stop-color="var(--yellow-highlight)"/>
                <stop offset="100%" stop-color="var(--yellow)"/>
              </radialGradient>
            </defs>
            <g transform="translate(160 140)">
              <g fill="var(--yellow)" stroke="var(--ochre)" stroke-width="2">
                <ellipse rx="34" ry="70" transform="rotate(0) translate(0 -70)" />
                <ellipse rx="34" ry="70" transform="rotate(90) translate(0 -70)" />
                <ellipse rx="34" ry="70" transform="rotate(180) translate(0 -70)" />
                <ellipse rx="34" ry="70" transform="rotate(270) translate(0 -70)" />
              </g>
              <circle cx="0" cy="0" r="60" fill="var(--centre-outer)" />
              <circle cx="0" cy="0" r="42" fill="var(--centre-inner)" />
            </g>
            <path d="M160 200 C150 240 150 280 160 320" fill="none" stroke="var(--sage)" stroke-width="18" stroke-linecap="round"/>
            <path d="M160 240 C130 230 110 270 108 292" fill="none" stroke="var(--sage)" stroke-width="14" stroke-linecap="round"/>
            <path d="M160 260 C190 255 210 295 212 315" fill="none" stroke="var(--sage)" stroke-width="14" stroke-linecap="round"/>
          </svg>
        </div>
      </section>

      <section class="placeholder-note">
        <p>Tap the cog to switch themes and make the day feel just right.</p>
      </section>
    </main>
  </div>

  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <div class="sheet" id="settingsSheet" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="sheet-panel">
      <div class="sheet-header">
        <h2 id="settingsTitle">Settings</h2>
        <button id="closeSettings" aria-label="Close settings">✕</button>
      </div>
      <div class="setting-block">
        <div class="setting-label">Theme</div>
        <label><input type="radio" name="theme" value="auto" /> Auto</label>
        <label><input type="radio" name="theme" value="sunflowers" /> Sunflowers</label>
        <label><input type="radio" name="theme" value="starry" /> Starry Night</label>
        <p class="help">Auto follows your device preference, or choose a mood.</p>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'bloom_settings_v1';
    const defaultSettings = { version: 1, theme: 'auto' };

    const appRoot = document.documentElement;
    const todayDate = document.getElementById('todayDate');
    const settingsButton = document.getElementById('settingsButton');
    const closeSettings = document.getElementById('closeSettings');
    const settingsSheet = document.getElementById('settingsSheet');
    const sheetBackdrop = document.getElementById('sheetBackdrop');
    const themeInputs = document.querySelectorAll('input[name="theme"]');

    function formatToday() {
      const now = new Date();
      return now.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
    }

    function loadSettings() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { ...defaultSettings };
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return { ...defaultSettings };
        return { ...defaultSettings, ...parsed };
      } catch (err) {
        console.warn('Failed to load settings', err);
        return { ...defaultSettings };
      }
    }

    function saveSettings(settings) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
    }

    function currentSystemTheme() {
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'starry' : 'sunflowers';
    }

    function applyTheme(theme) {
      const selected = theme === 'auto' ? currentSystemTheme() : theme;
      appRoot.setAttribute('data-theme', selected);
      if (selected === 'starry') {
        document.querySelector('meta[name="theme-color"]').setAttribute('content', '#08122E');
      } else {
        document.querySelector('meta[name="theme-color"]').setAttribute('content', '#F7EDD8');
      }
    }

    function populateThemeInputs(theme) {
      themeInputs.forEach(input => {
        input.checked = input.value === theme;
      });
    }

    function openSettings() {
      settingsSheet.classList.add('active');
      sheetBackdrop.classList.add('active');
    }

    function closeSettingsSheet() {
      settingsSheet.classList.remove('active');
      sheetBackdrop.classList.remove('active');
    }

    function initTheme() {
      const settings = loadSettings();
      applyTheme(settings.theme);
      populateThemeInputs(settings.theme);
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        const stored = loadSettings();
        if (stored.theme === 'auto') applyTheme('auto');
      });
    }

    settingsButton.addEventListener('click', openSettings);
    closeSettings.addEventListener('click', closeSettingsSheet);
    sheetBackdrop.addEventListener('click', closeSettingsSheet);

    themeInputs.forEach(input => {
      input.addEventListener('change', event => {
        const theme = event.target.value;
        const settings = loadSettings();
        settings.theme = theme;
        saveSettings(settings);
        applyTheme(theme);
      });
    });

    document.addEventListener('keydown', event => {
      if (event.key === 'Escape' && settingsSheet.classList.contains('active')) {
        closeSettingsSheet();
      }
    });

    function registerServiceWorker() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => {
          console.warn('Service worker failed to register', err);
        });
      }
    }

    todayDate.textContent = formatToday();
    initTheme();
    registerServiceWorker();
  </script>
</body>
</html>
